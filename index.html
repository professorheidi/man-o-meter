<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man-O-Meter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #ffe4e1;
        }
        .slider-container {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .relationship-label {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 30px;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: #bbb;
            outline: none;
            opacity: 1;
            transition: background .15s ease-in-out;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ff69b4;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #ff69b4;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Man-O-Meter</h1>
    <p>Rate the men in your life!</p>
    <div id="sliders"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const men = [
                { name: "Boyfriend", emojis: ["🤢", "😐", "😍"] },
                { name: "Ex-Boyfriend", emojis: ["😡", "🤨", "😊"] },
                { name: "Crush", emojis: ["🙄", "🙂", "❤️"] },
                { name: "Situationship", emojis: ["🤷", "👍", "🔥"] }
            ];

            men.forEach(person => {
                const container = document.createElement("div");
                container.className = "slider-container";

                const label = document.createElement("div");
                label.className = "relationship-label";
                label.textContent = person.name;
                container.appendChild(label);

                const emoji = document.createElement("div");
                emoji.className = "emoji";
                emoji.textContent = person.emojis[1];
                container.appendChild(emoji);

                const slider = document.createElement("input");
                slider.type = "range";
                slider.min = "0";
                slider.max = "2";
                slider.value = "1";
                slider.step = "1";
                slider.addEventListener("input", function() {
                    emoji.textContent = person.emojis[parseInt(slider.value)];
                });
                container.appendChild(slider);

                document.getElementById("sliders").appendChild(container);
            });
        });
    </script>
</body>
</html>
